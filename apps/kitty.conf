font_size {{terminal_font_size}}

cursor_blink_interval 0
cursor_trail 200
cursor_trail_decay 0.3 0.5
enable_audio_bell no
remember_window_size no
initial_window_width 1000
initial_window_height 700

map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+h show_scrollback
map ctrl+shift+[ previous_tab
map ctrl+shift+] next_tab

map ctrl+shift+equal change_font_size current +1.0
map ctrl+shift+minus change_font_size current -1.0

background #{{colors.background}}
foreground #{{colors.foreground}}

selection_background #{{colors.foreground}}
selection_foreground #{{colors.background}}

cursor #{{colors.cursor}}
cursor_text_color background

active_tab_background #{{colors.background}}
active_tab_foreground #{{colors.accent}}
active_tab_font_style bold
inactive_tab_background #{{colors.background}}
inactive_tab_foreground #{{colors.gray}}
inactive_tab_font_style normal

# Black
color0 #{{colors.black}}
color8 #{{colors.gray}}

# Red
color1 #{{colors.red}}
color9 #{{colors.red}}

# Green
color2 #{{colors.green}}
color10 #{{colors.green}}

# Yellow
color3 #{{colors.orange}}
color11 #{{colors.yellow}}

# Blue
color4 #{{colors.blue}}
color12 #{{colors.blue}}

# Magenta
color5 #{{colors.purple}}
color13 #{{colors.purple}}

# Cyan
color6 #{{colors.cyan}}
color14 #{{colors.cyan}}

# White
color7 #{{colors.white}}
color15 #{{colors.foreground}}
